<html>
    <head><title>Registration Form</title>
    </head>
    <body>
        <form>
            <table border="1" align="center"cellspacing="2px"cellpadding="10px">
               <tr>
               <th colspan ="4">Registration form </th>
               </tr>

               <tr>
                <td>Student name</td>
                <td><input type="text"placeholder="First name"></td>
                <td><input type="text"placeholder="middle name"></td>
                <td><input type="text"placeholder="last name"></td>
                </tr>

                <tr>
                    <td>Father's name</td>
                    <td><input type="text"placeholder="enter your father's name"></td>

                    <td>Mother's name</td>
                    <td><input type="text"placeholder="enter your mother's name"></td>
                </tr>
                <tr>
                    <td>Date of Birth</td>
                    <td><input type="date"></td>
                    <td>Gender</td>
                    <td>Male<input type="radio"name="gender">
                        Female<input type="radio" name="gender"></td>
                        <tr>
                            <td>Category</td>
                            <td>Gen<input type="radio"name="Category">
                                OBC<input type="radio" name="Category">
                                SC/ST<input type="radio"name="Category"></td>
                                <td>Handicapped</td>
                                <td>Yes<input type="radio" name="Yes">
                                No <input type="radio"name="No">
                                </td>
                        </tr>
                        <tr>
                            <td>Ex-serviceman</td>
                            <td>Yes<input type="radio" name="Yes">
                            No <input type="radio"></td>
                            <td>EWS</td>
                            <td>Yes<input type="radio">
                            No <input type="radio"></td>
                        </tr>
                        <tr>
                            <td>Email ID</td>
                            <td><input type="email"></td>
                            <td>Mobile No.</td>
                            <td><input type="number"></td>
                        </tr>
                        <tr>
                            <td>State </td>
                            <td><select>
                                <option>Select any one </option>
                                <option>Punjab </option>
                                <option>Gujarat</option>
                                <option>Rajasthan</option>
                            </select>
                            </td>
                            <td>city</td>
                            <td><select>
                                <option>select any one</option>
                                <option>Amritsar</option>
                                <option>Ludhiana</option>
                                <option>Jalandhar</option>
                            </select>
                        </td>
                        </tr>
                        <tr>
                            <td>Upload photo</td>
                            <td><input type="file"></td>
                            <td>Upload Signature </td>
                            <td><input type="file"></td>
                        </tr>
                        <tr>
                            <td colspan="4"align="center">
                                <input type="submit"value="submit">
                            </td>
                        </tr>
                    </table>
        </form>
    </body>
</html>
